name: Publish create-pullmint to npm

on:
  push:
    tags:
      - 'create-pullmint/v*'

jobs:
  publish:
    name: Build and publish
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'
          cache: 'npm'
          cache-dependency-path: packages/create-pullmint/package-lock.json

      - name: Install dependencies
        working-directory: packages/create-pullmint
        run: npm ci

      - name: Type check
        working-directory: packages/create-pullmint
        run: npx tsc --noEmit

      - name: Run tests
        working-directory: packages/create-pullmint
        run: npm test

      - name: Build
        working-directory: packages/create-pullmint
        run: npm run build

      - name: Publish to npm
        working-directory: packages/create-pullmint
        run: npm publish --provenance --access public
