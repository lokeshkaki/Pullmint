name: Stale

on:
  schedule:
    - cron: '0 0 * * 1' # Every Monday at midnight UTC
  workflow_dispatch:

permissions:
  issues: write
  pull-requests: write

jobs:
  stale:
    name: Close Stale PRs and Issues
    runs-on: ubuntu-latest
    steps:
      - uses: actions/stale@b5d41d4e1d5dceea10e7104786b73624c18a190f # v10.2.0
        with:
          stale-pr-message: 'This PR has been inactive for 14 days and is now marked as stale. It will be closed in 7 days if no further activity occurs.'
          stale-issue-message: 'This issue has been inactive for 30 days and is now marked as stale. It will be closed in 14 days if no further activity occurs.'
          days-before-pr-stale: 14
          days-before-pr-close: 7
          days-before-issue-stale: 30
          days-before-issue-close: 14
          stale-pr-label: 'stale'
          stale-issue-label: 'stale'
          exempt-pr-labels: 'do-not-close,work-in-progress'
          exempt-issue-labels: 'do-not-close,pinned'
