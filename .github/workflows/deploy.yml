name: Deploy

on:
  workflow_run:
    workflows: [CI]
    types: [completed]
    branches: [main]
  workflow_dispatch:

jobs:
  build-and-push:
    if: ${{ github.event.workflow_run.conclusion == 'success' || github.event_name == 'workflow_dispatch' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Set lowercase repository name
        run: echo "REPO_LC=${GITHUB_REPOSITORY,,}" >> "$GITHUB_ENV"

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push API image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: services/api/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ env.REPO_LC }}/api:latest
            ghcr.io/${{ env.REPO_LC }}/api:${{ github.sha }}

      - name: Build and push Workers image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: services/workers/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ env.REPO_LC }}/workers:latest
            ghcr.io/${{ env.REPO_LC }}/workers:${{ github.sha }}

      - name: Build and push Dashboard image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: services/dashboard/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ env.REPO_LC }}/dashboard:latest
            ghcr.io/${{ env.REPO_LC }}/dashboard:${{ github.sha }}
