name: Deploy

on:
  workflow_run:
    workflows: ['CI']
    types: [completed]
    branches: [main]
  workflow_dispatch:
    inputs:
      gsiStage:
        description: 'Optional DynamoDB GSI stage (ByRepo, ByRepoPr, ByTimestamp)'
        required: false
        default: ''

jobs:
  deploy:
    name: Deploy to AWS
    if: >
      github.ref == 'refs/heads/main' &&
      (github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success')
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@7474bc4690e29a8392af63c5b98e7449536d5c3a # v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: us-east-1

      - name: Bootstrap CDK
        run: cd infrastructure && npx cdk bootstrap ${{ secrets.AWS_ACCOUNT_ID }}/us-east-1
        env:
          CDK_DEFAULT_ACCOUNT: ${{ secrets.AWS_ACCOUNT_ID }}
          CDK_DEFAULT_REGION: us-east-1
          GITHUB_APP_ID: ${{ secrets.PULLMINT_GITHUB_APP_ID }}

      - name: CDK Deploy
        run: |
          cd infrastructure
          if [ -n "${{ inputs.gsiStage }}" ]; then
            npm run deploy -- --require-approval never -c gsiStage=${{ inputs.gsiStage }}
          else
            # For existing tables with GSIs already created, use gsiStage=all to avoid deletion
            # For initial deployment of a NEW stack, use incremental GSI creation (see README)
            npm run deploy -- --require-approval never -c gsiStage=all
          fi
        env:
          CDK_DEFAULT_ACCOUNT: ${{ secrets.AWS_ACCOUNT_ID }}
          CDK_DEFAULT_REGION: us-east-1
          GITHUB_APP_ID: ${{ secrets.PULLMINT_GITHUB_APP_ID }}

      - name: Post deployment status
        if: success()
        run: |
          echo "Deployment successful"
          echo "Check AWS Console for deployed resources"
