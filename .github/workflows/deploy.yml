name: Deploy

on:
  workflow_run:
    workflows: ['CI']
    types: [completed]
    branches: [main]
  workflow_dispatch:
    inputs:
      gsiStage:
        description: 'Optional DynamoDB GSI stage (ByRepo, ByRepoPr, ByTimestamp, StatusDeployedAtIndex, all)'
        required: false
        default: ''

jobs:
  staging:
    name: Deploy to Staging
    if: >
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'workflow_run' &&
       github.event.workflow_run.conclusion == 'success' &&
       github.event.workflow_run.head_branch == 'main')
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@61815dcd50bd041e203e49132bacad1fd04d2708 # v5.1.1
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: us-east-1

      - name: Bootstrap CDK
        run: cd infrastructure && npx cdk bootstrap ${{ secrets.AWS_ACCOUNT_ID }}/us-east-1
        env:
          CDK_DEFAULT_ACCOUNT: ${{ secrets.AWS_ACCOUNT_ID }}
          CDK_DEFAULT_REGION: us-east-1
          GITHUB_APP_ID: ${{ secrets.PULLMINT_GITHUB_APP_ID }}
          DEPLOYMENT_ENVIRONMENT: staging

      - name: CDK Deploy (staging)
        run: |
          cd infrastructure
          if [ -n "${{ inputs.gsiStage }}" ]; then
            npx cdk deploy PullmintStagingStack --require-approval never -c stage=staging -c gsiStage=${{ inputs.gsiStage }}
          else
            # For existing tables with GSIs already created, use gsiStage=all to avoid deletion
            # For initial deployment of a NEW stack, use incremental GSI creation (see README)
            npx cdk deploy PullmintStagingStack --require-approval never -c stage=staging -c gsiStage=all
          fi
        env:
          CDK_DEFAULT_ACCOUNT: ${{ secrets.AWS_ACCOUNT_ID }}
          CDK_DEFAULT_REGION: us-east-1
          GITHUB_APP_ID: ${{ secrets.PULLMINT_GITHUB_APP_ID }}
          DEPLOYMENT_ENVIRONMENT: staging

      - name: Smoke test
        run: |
          ENDPOINT=$(aws cloudformation describe-stacks --stack-name PullmintStagingStack --query "Stacks[0].Outputs[?OutputKey=='ApiUrl'].OutputValue" --output text)
          ENDPOINT="${ENDPOINT%/}"
          for i in 1 2 3; do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" "${ENDPOINT}/dashboard")
            if [ "$STATUS" = "302" ]; then
              echo "Smoke test passed (attempt $i)"
              exit 0
            fi
            echo "Attempt $i: got $STATUS, expected 302"
            sleep 10
          done
          echo "Smoke test failed after 3 attempts"
          exit 1

      - name: Post deployment status
        if: success()
        run: |
          echo "Staging deployment successful"

  production:
    name: Deploy to Production
    needs: staging
    if: >
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'workflow_run' &&
       github.event.workflow_run.conclusion == 'success' &&
       github.event.workflow_run.head_branch == 'main')
    runs-on: ubuntu-latest
    environment:
      name: production
    permissions:
      id-token: write
      contents: read

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@61815dcd50bd041e203e49132bacad1fd04d2708 # v5.1.1
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: us-east-1

      - name: Bootstrap CDK
        run: cd infrastructure && npx cdk bootstrap ${{ secrets.AWS_ACCOUNT_ID }}/us-east-1
        env:
          CDK_DEFAULT_ACCOUNT: ${{ secrets.AWS_ACCOUNT_ID }}
          CDK_DEFAULT_REGION: us-east-1
          GITHUB_APP_ID: ${{ secrets.PULLMINT_GITHUB_APP_ID }}
          DEPLOYMENT_ENVIRONMENT: production

      - name: CDK Deploy (production)
        run: |
          cd infrastructure
          if [ -n "${{ inputs.gsiStage }}" ]; then
            npm run deploy -- --require-approval never -c stage=production -c gsiStage=${{ inputs.gsiStage }}
          else
            npm run deploy -- --require-approval never -c stage=production -c gsiStage=all
          fi
        env:
          CDK_DEFAULT_ACCOUNT: ${{ secrets.AWS_ACCOUNT_ID }}
          CDK_DEFAULT_REGION: us-east-1
          GITHUB_APP_ID: ${{ secrets.PULLMINT_GITHUB_APP_ID }}
          DEPLOYMENT_ENVIRONMENT: production

      - name: Post deployment status
        if: success()
        run: |
          echo "Production deployment successful"
