name: Site

on:
  push:
    branches: [main]
    paths:
      - 'site/**'
      - '.github/workflows/site.yml'
  pull_request:
    paths:
      - 'site/**'
      - '.github/workflows/site.yml'
  workflow_dispatch:

concurrency:
  group: site-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  id-token: write # For OIDC with AWS

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build site
        run: npm run build --workspace=site

      - name: Validate HTML
        run: cd site && npx html-validate dist/index.html

      - name: Upload build artifact
        if: github.ref == 'refs/heads/main'
        uses: actions/upload-artifact@v4
        with:
          name: site-dist
          path: site/dist

  deploy:
    if: github.ref == 'refs/heads/main'
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: site-dist
          path: dist

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: us-east-1

      - name: Deploy static assets to S3
        run: |
          aws s3 sync dist/ s3://${{ vars.SITE_S3_BUCKET }}/ \
            --delete \
            --cache-control "public, max-age=31536000, immutable" \
            --exclude "*.html" \
            --exclude "*.json" \
            --exclude "sitemap*.xml"

      - name: Deploy HTML/JSON to S3
        run: |
          aws s3 sync dist/ s3://${{ vars.SITE_S3_BUCKET }}/ \
            --delete \
            --cache-control "public, max-age=0, must-revalidate" \
            --exclude "*" \
            --include "*.html" \
            --include "*.json" \
            --include "sitemap*.xml"

      - name: Invalidate CloudFront
        run: |
          aws cloudfront create-invalidation \
            --distribution-id ${{ vars.SITE_CLOUDFRONT_ID }} \
            --paths "/*"
