version: '3.8'

services:
  postgres-e2e:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: pullmint
      POSTGRES_PASSWORD: pullmint
      POSTGRES_DB: pullmint_e2e
    ports:
      - "5434:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pullmint"]
      interval: 2s
      timeout: 5s
      retries: 15

  redis-e2e:
    image: redis:7-alpine
    ports:
      - "6381:6379"
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 2s
      timeout: 5s
      retries: 15

  minio-e2e:
    image: minio/minio:latest
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9003:9000"
    command: server /data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://127.0.0.1:9000/minio/health/live"]
      interval: 2s
      timeout: 5s
      retries: 15
