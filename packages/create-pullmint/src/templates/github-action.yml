# .github/workflows/pullmint.yml
# Generated by create-pullmint - https://github.com/lokeshkaki/pullmint
name: Pullmint PR Analysis

on:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  analyze:
    name: AI Code Review
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run Pullmint Analysis
        uses: lokeshkaki/pullmint@v1
        with:
          anthropic-api-key: ${{ secrets.ANTHROPIC_API_KEY }}
          # Optional overrides:
          # auto-approve-below: 25
          # severity-threshold: medium
