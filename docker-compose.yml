version: '3.8'

services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: pullmint
      POSTGRES_PASSWORD: pullmint
      POSTGRES_DB: pullmint
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pullmint"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 512m
        reservations:
          memory: 256m

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 128m
        reservations:
          memory: 64m

  minio:
    image: minio/minio:latest
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 256m
        reservations:
          memory: 128m

  api:
    build:
      context: .
      dockerfile: services/api/Dockerfile
    ports:
      - "3000:3000"
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://pullmint:pullmint@postgres:5432/pullmint
      REDIS_URL: redis://redis:6379
      MINIO_ENDPOINT: http://minio:9000
      ANALYSIS_RESULTS_BUCKET: pullmint-analysis-results
      DASHBOARD_AUTH_TOKEN: ${DASHBOARD_AUTH_TOKEN:-test-token}
      NODE_OPTIONS: --max-old-space-size=384
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:3000/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    stop_grace_period: 15s
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 512m
        reservations:
          memory: 256m

  workers:
    build:
      context: .
      dockerfile: services/workers/Dockerfile
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://pullmint:pullmint@postgres:5432/pullmint
      REDIS_URL: redis://redis:6379
      MINIO_ENDPOINT: http://minio:9000
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
      ANALYSIS_RESULTS_BUCKET: pullmint-analysis-results
      NODE_OPTIONS: --max-old-space-size=768
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "test $(( $(date +%s) - $(cat /tmp/pullmint-worker-health 2>/dev/null || echo 0) )) -lt 30 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 30s
    stop_grace_period: 30s
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 1024m
        reservations:
          memory: 512m

  workers-analysis:
    build:
      context: .
      dockerfile: services/workers/Dockerfile
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://pullmint:pullmint@postgres:5432/pullmint
      REDIS_URL: redis://redis:6379
      MINIO_ENDPOINT: http://minio:9000
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
      ANALYSIS_RESULTS_BUCKET: pullmint-analysis-results
      WORKER_GROUP: analysis
      NODE_OPTIONS: --max-old-space-size=384
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "test $(( $(date +%s) - $(cat /tmp/pullmint-worker-health 2>/dev/null || echo 0) )) -lt 30 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 30s
    stop_grace_period: 30s
    restart: unless-stopped
    profiles:
      - split
    deploy:
      resources:
        limits:
          memory: 512m
        reservations:
          memory: 256m

  workers-integration:
    build:
      context: .
      dockerfile: services/workers/Dockerfile
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://pullmint:pullmint@postgres:5432/pullmint
      REDIS_URL: redis://redis:6379
      MINIO_ENDPOINT: http://minio:9000
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
      ANALYSIS_RESULTS_BUCKET: pullmint-analysis-results
      WORKER_GROUP: integration
      NODE_OPTIONS: --max-old-space-size=192
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "test $(( $(date +%s) - $(cat /tmp/pullmint-worker-health 2>/dev/null || echo 0) )) -lt 30 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 30s
    stop_grace_period: 30s
    restart: unless-stopped
    profiles:
      - split
    deploy:
      resources:
        limits:
          memory: 256m
        reservations:
          memory: 128m

  workers-background:
    build:
      context: .
      dockerfile: services/workers/Dockerfile
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://pullmint:pullmint@postgres:5432/pullmint
      REDIS_URL: redis://redis:6379
      MINIO_ENDPOINT: http://minio:9000
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
      ANALYSIS_RESULTS_BUCKET: pullmint-analysis-results
      WORKER_GROUP: background
      NODE_OPTIONS: --max-old-space-size=192
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "test $(( $(date +%s) - $(cat /tmp/pullmint-worker-health 2>/dev/null || echo 0) )) -lt 30 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 30s
    stop_grace_period: 30s
    restart: unless-stopped
    profiles:
      - split
    deploy:
      resources:
        limits:
          memory: 256m
        reservations:
          memory: 128m

  dashboard:
    build:
      context: .
      dockerfile: services/dashboard/Dockerfile
    ports:
      - "3001:80"
    depends_on:
      - api
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:80/ || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 64m
        reservations:
          memory: 32m

volumes:
  postgres_data:
  redis_data:
  minio_data: